<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcraft — Minecraft</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #game-frame { width: 100%; height: 100%; border: none; display: block; }
        #fallback { display: none; position: fixed; inset: 0; background: #0f0f0f; color: #e5e7eb; font-family: system-ui, sans-serif; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 2rem; text-align: center; }
        #fallback a { color: #1bd96a; }
    </style>
</head>
<body>
    <iframe id="game-frame" title="Minecraft" allow="fullscreen; gamepad" allowfullscreen></iframe>
    <div id="fallback">
        <p>If the game did not load, open it directly:</p>
        <a id="direct-link" href="#" target="_blank" rel="noopener">Open Eaglercraft in new tab</a>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var server = params.get('server') || '';
            var base = 'https://dev.eaglercraft.com/play/';
            var url = server ? base + '?server=' + encodeURIComponent(server) : base;
            var iframe = document.getElementById('game-frame');
            var fallback = document.getElementById('fallback');
            var directLink = document.getElementById('direct-link');
            directLink.href = url;
            iframe.src = url;
            iframe.onerror = function () {
                iframe.style.display = 'none';
                fallback.style.display = 'flex';
            };
        })();
    </script>
</body>
</html>
