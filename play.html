<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcraft — Minecraft</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #e5e7eb; font-family: system-ui, sans-serif; }
        #game-frame { width: 100%; height: 100%; border: none; display: block; }
        #fallback { display: none; position: fixed; inset: 0; background: #0f0f0f; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 2rem; text-align: center; }
        #fallback a { color: #1bd96a; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; background: #0a0a0a; color: #9ca3af; }
        #loading.hide { display: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #1bd96a; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <span>Loading Eaglercraft…</span>
    </div>
    <iframe id="game-frame" title="Minecraft" allow="fullscreen; gamepad" allowfullscreen style="display:none;"></iframe>
    <div id="fallback">
        <p>If the game did not load (e.g. blocked by network), open it directly:</p>
        <a id="direct-link" href="#" target="_blank" rel="noopener">Open Eaglercraft in new tab</a>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var server = params.get('server') || '';
            var base = 'https://dev.eaglercraft.com/play/';
            var url = server ? base + '?server=' + encodeURIComponent(server) : base;
            var iframe = document.getElementById('game-frame');
            var fallback = document.getElementById('fallback');
            var loading = document.getElementById('loading');
            var directLink = document.getElementById('direct-link');
            directLink.href = url;
            iframe.src = url;
            function showFallback() {
                if (loading) loading.classList.add('hide');
                if (iframe) iframe.style.display = 'none';
                if (fallback) fallback.style.display = 'flex';
            }
            function showGame() {
                if (loading) loading.classList.add('hide');
                if (iframe) iframe.style.display = 'block';
            }
            iframe.onload = function () { showGame(); };
            setTimeout(function () {
                if (loading && !loading.classList.contains('hide')) showFallback();
            }, 12000);
        })();
    </script>
</body>
</html>
